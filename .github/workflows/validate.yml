name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install validator dependencies
        working-directory: tools/validate-cli
        run: npm install

      - name: Run validator unit tests
        working-directory: tools/validate-cli
        run: node --test test.js

      - name: Validate every example against the schema
        working-directory: tools/validate-cli
        run: npm run validate:examples
